  - name: "tasks"
    label: "Tasks - All (option to map to Webflow/static site)"
    folder: "content/src/roadmaps/tasks"
    summary: "{{displayname}} - {{name}}"
    identifier_field: "{{id}}"
    slug: "{{fields.id}}"
    delete: true
    sortable_fields: ["id", "name", "{{urlSlug}}", "industryId"]
    create: true
    editor:
      preview: true
    fields:
      - { label: "Internal Notes", name: "notesMd", widget: "markdown", required: false }
      - { label: "License Name", name: "licenseName", widget: hidden, default: "", required: false }
      - { label: "Id", name: "id", widget: "write-once-read-only-no-space", required: true }
      - {
          label: "Display Name",
          name: "displayname",
          widget: "no-space",
          required: true,
          hint: "This is the name displayed internally in CMS list.",
        }
      - { label: "Url Slug", name: "urlSlug", widget: "no-space", required: true }
      - {
          label: "Name (Navigator)",
          name: "name",
          widget: "string",
          required: true,
          hint: "This is the task name displayed to users in My Account.",
        }
      - {
          label: "Sync to Webflow",
          name: "syncToWebflow",
          widget: "boolean",
          required: false,
          default: false,
          hint:
            "Enable to sync this task to the Webflow site. You must provide a 'Webflow Name' if this
            is selected.",
        }
      - {
          label: "Webflow Name",
          name: "webflowName",
          widget: "string",
          required: false,
          hint:
            "Required if 'Sync to Webflow' is enabled. This is the name displayed to users on the
            Webflow site.",
        }
      - {
          label: "Summary Description",
          name: "summaryDescriptionMd",
          widget: "markdown",
          hint: "Used in both Navigator and Webflow (if synced).",
        }
      - {
          label: "Content (Navigator)",
          name: "body",
          widget: "markdown",
          hint: "Detailed description shown in Navigator.",
        }
      - {
          label: "Form Name",
          name: "formName",
          widget: "string",
          required: false,
          hint: "Used in both Navigator and Webflow (if synced).",
        }
      - label: "Industry"
        name: industryId
        widget: "relation"
        multiple: true
        collection: "roadmaps"
        search_fields: ["id"]
        value_field: "{{id}}"
        display_fields: ["{{name}}"]
        required: false
        options_length: 500
        hint: "Can select multiple industries."
      - {
          label: "Call To Action Text",
          name: "callToActionText",
          widget: "string",
          required: false,
          hint: "Used in both Navigator and Webflow (if synced).",
        }
      - {
          label: "Call To Action Link",
          name: "callToActionLink",
          widget: "string",
          required: false,
          hint: "Used in both Navigator and Webflow (if synced).",
        }
      - label: "Licensing Agency"
        name: agencyId
        widget: relation
        required: false
        collection: "mappings"
        search_fields: ["arrayOfTaskAgencies.*.name"]
        value_field: "arrayOfTaskAgencies.*.id"
        display_fields: ["arrayOfTaskAgencies.*.name"]
        options_length: 500
        hint: "Used in both Navigator and Webflow (if synced)."
      - {
          label: "Agency Additional Context",
          name: "agencyAdditionalContext",
          widget: "string",
          required: false,
          hint: "Used in both Navigator and Webflow (if synced).",
        }
      - { label: "Division Phone", name: "divisionPhone", widget: "string", required: false }
      - label: "Type (Webflow)"
        name: "webflowType"
        widget: "select"
        required: false
        hint: "Categorization for Webflow display."
        options:
          - { label: "business license", value: "business-license" }
          - { label: "individual license", value: "individual-license" }
          - { label: "school/course", value: "school-course" }
          - { label: "object or vehicle", value: "object-vehicle" }
      - {
          label: "Industry (Webflow - archive)",
          name: "webflowIndustry",
          widget: "string",
          required: false,
        }
      - {
          label: "License Classification (Webflow - archive)",
          name: "licenseCertificationClassification",
          widget: "string",
          required: false,
        }
