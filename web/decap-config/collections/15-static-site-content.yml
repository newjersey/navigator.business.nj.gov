collections:
  - name: "static-site-content"
    label: "💻 Static Site Content"
    folder: "content/src"
    fields:
      - { name: "" }

  - name: "faqs"
    label: "FAQs"
    folder: "content/src/faqs"
    summary: "{{name}}"
    identifier_field: "{{slug}}"
    slug: "{{slug}}"
    delete: true
    sortable_fields: ["name", "category", "sub-category"]
    create: true
    editor:
      preview: false
    fields:
      - { label: "FAQ Title", name: "name", widget: "string" }
      - {
          label: "Slug",
          name: "slug",
          widget: "no-space",
          required: true,
          hint: "URL-friendly identifier (alphanumeric, no spaces or special characters)",
        }
      - {
          label: "FAQ Body",
          name: "body",
          widget: "markdown",
          hint:
            "IMPORTANT: Widgets used in the My Account app are not supported for static site content",
        }
      - label: "Category"
        name: "category"
        widget: "select"
        required: false
        options:
          - { label: "Plan a Business", value: "plan-a-business" }
          - { label: "Start a Business", value: "start-a-business" }
          - { label: "Operate a Business", value: "operate-a-business" }
          - { label: "Grow a Business", value: "grow-a-business" }
          - { label: "Finance a Business", value: "finance-a-business" }
          - { label: "Resources", value: "resources" }
      - label: "Sub-Category"
        name: "sub-category"
        widget: "select"
        required: false
        options:
          - { label: "Starting a Business", value: "starting-a-business" }
          - { label: "Registering a Business", value: "registering-a-business" }
          - { label: "Choosing a Business Type", value: "choosing-a-business-type" }
          - { label: "Industry-Specific Guidance", value: "industry-specific-guidance" }
          - { label: "Operate a Business", value: "operate-a-business" }
          - { label: "Hiring Employees", value: "hiring-employees" }
          - { label: "Exporting", value: "exporting" }
          - { label: "Filings and Accounting", value: "filings-and-accounting" }
          - { label: "Tax Information", value: "tax-information" }
          - { label: "Grow a Business", value: "grow-a-business" }
          - { label: "Contracting with the State", value: "contracting-with-the-state" }

  - name: "categories"
    label: "Categories"
    folder: "content/src/categories"
    summary: "{{name}}"
    identifier_field: "{{slug}}"
    slug: "{{slug}}"
    delete: false
    sortable_fields: ["name", "navbar-order"]
    create: false
    editor:
      preview: false
    fields:
      - { label: "Name", name: "name", widget: "string", required: true }
      - {
          label: "Slug",
          name: "slug",
          widget: "no-space",
          required: true,
          hint: "URL-friendly identifier (alphanumeric, no spaces or special characters)",
        }
      - {
          label: "Nav Name",
          name: "nav-name",
          widget: "string",
          required: false,
          hint: "Name displayed in navigation",
        }
      - {
          label: "Description Text",
          name: "description-text",
          widget: "text",
          required: false,
          hint: "Description of the topic that appears in each section",
        }
      - {
          label: "Navbar Order",
          name: "navbar-order",
          widget: "number",
          required: false,
          value_type: "int",
          min: 1,
          max: 10,
          hint: "Order in navigation bar (1-10)",
        }
      - {
          label: "Customized Drop Down Link Filter",
          name: "customized-drop-down-link-filter",
          widget: "string",
          required: false,
          hint: "Filter for drop down links on specific category pages",
        }
      - {
          label: "Background Image",
          name: "bg-image",
          widget: "image",
          required: false,
          hint: "Background image for the left column",
        }
      - {
          label: "Topic Icon (Transparent BG)",
          name: "topic-icon",
          widget: "image",
          required: false,
          hint: "Icon for desktop version",
        }
      - {
          label: "Mobile Icon",
          name: "mobile-icon",
          widget: "image",
          required: false,
          hint: "Icon for mobile version",
        }
      - {
          label: "Topic Icon (White BG)",
          name: "topic-icon-white-bg",
          widget: "image",
          required: false,
        }
      - {
          label: "Topic Icon (Category Page)",
          name: "topic-icon-cat-page",
          widget: "image",
          required: false,
        }
      - { label: "Arrow", name: "arrow", widget: "image", required: false }
      - {
          label: "Icon Accessibility Alt Description",
          name: "icon-accessibility-alt-description",
          widget: "string",
          required: false,
          hint: "Alt text for accessibility",
        }
      - {
          label: "Topic Color",
          name: "topic-color",
          widget: "color",
          required: false,
          hint: "Main theme color for this category",
        }
      - {
          label: "Topic Description",
          name: "topic-description",
          widget: "text",
          required: false,
          hint: "Appears on topics screen under the title",
        }
      - {
          label: "Homepage Description",
          name: "homepage-description",
          widget: "text",
          required: false,
          hint: "Appears on homepage tiles",
        }
      - {
          label: "Nav Promo Hero Button Text",
          name: "nav-promo-hero-button-text",
          widget: "string",
          required: false,
          hint: "Button text for nav promo under page summary",
        }
      - {
          label: "Navigator Promotion Image",
          name: "navigator-promotion-image",
          widget: "image",
          required: false,
          hint: "Image for side nav bar promotion box",
        }
      - { label: "Nav Promo Heading", name: "nav-promo-heading", widget: "string", required: false }
      - {
          label: "Nav Promo Description",
          name: "nav-promo-description",
          widget: "text",
          required: false,
        }
      - {
          label: "Nav Promo Button Text",
          name: "nav-promo-button-text",
          widget: "string",
          required: false,
        }
      - {
          label: "Navigation Promotion Color",
          name: "navigation-promotion-color",
          widget: "color",
          required: false,
          hint: "Color of navigator sidebar promotion tile overlay",
        }
      - {
          label: "Navigation Tile Border Color",
          name: "navigation-tile-border-color",
          widget: "color",
          required: false,
        }
      - {
          label: "Nav Promo Text Color",
          name: "nav-promo-text-color-2",
          widget: "color",
          required: false,
        }
      - {
          label: "Category Page Tile Background",
          name: "category-page-tile-background",
          widget: "color",
          required: false,
        }
      - {
          label: "Category Page Header",
          name: "category-page-header",
          widget: "color",
          required: false,
        }
      - {
          label: "Category Page Promo Text",
          name: "category-page-promo-text",
          widget: "color",
          required: false,
        }
      - {
          label: "Side Nav Hover Color",
          name: "side-nav-hover-color",
          widget: "color",
          required: false,
        }
      - {
          label: "Side Nav Background Color",
          name: "side-nav-background-color",
          widget: "color",
          required: false,
        }
      - {
          label: "Side Nav Active Color",
          name: "side-nav-active-color",
          widget: "color",
          required: false,
        }

  - name: "pages"
    label: "Pages"
    folder: "content/src/pages"
    summary: "{{name}}"
    identifier_field: "{{slug}}"
    slug: "{{slug}}"
    delete: false
    sortable_fields: ["name", "category", "rank"]
    create: false
    editor:
      preview: false
    fields:
      - { label: "Name", name: "name", widget: "string", required: true }
      - { label: "Slug", name: "slug", widget: "no-space", required: true }
      - label: "Category"
        name: "category"
        widget: "select"
        required: true
        options:
          - { label: "Plan a Business", value: "5e31b06cb76b837e68358b82" }
          - { label: "Start a Business", value: "5e31b06cb76b83de0d358b83" }
          - { label: "Operate a Business", value: "5e31b06cb76b833562358b84" }
          - { label: "Grow a Business", value: "5e31b06cb76b839f99358b85" }
          - { label: "Updates", value: "6183da96541d5d5e1ee9275d" }
      - {
          label: "Rank",
          name: "rank",
          widget: "number",
          value_type: "int",
          hint: "For sub-pages enter 0",
          required: false,
        }
      - { label: "Sub-Heading Text", name: "sub-heading-text", widget: "text", required: false }
      - { label: "Teaser Text", name: "teaser-text", widget: "text", required: false }
      - {
          label: "Include in Home Slider",
          name: "include-in-home-slider",
          widget: "boolean",
          required: false,
          default: false,
        }
      - {
          label: "Homepage Slider Order",
          name: "homepage-slider-order",
          widget: "number",
          required: false,
          value_type: "int",
        }
      - {
          label: "Is Sub Page",
          name: "is-sub-page",
          widget: "boolean",
          required: false,
          default: false,
          hint: "Will prevent the page from being displayed in the navbar and side nav.",
        }
      - {
          label: "Subpage of...",
          name: "primary-page",
          widget: "relation",
          collection: "pages",
          search_fields: ["name"],
          value_field: "webflowId",
          display_fields: ["name"],
          required: false,
          hint:
            "Required if 'IS SUB PAGE' -- Select the page for which this is a subpage - This field
            is used to create the breadcrumb (home>topic>page>sub-page)",
        }
      - { label: "Main Link Text", name: "main-link-text", widget: "string", required: false }
      - {
          label: "Non-Collection Link",
          name: "non-collection-link",
          widget: "string",
          required: false,
          hint: "Used to link an item to a unique page that is not part of the pages CMS.",
        }
      - {
          label: "Navigator Redirect",
          name: "coming-soon",
          widget: "boolean",
          required: false,
          default: false,
          hint: "Select to add the Navigator promotional section at the top of the page.",
        }
      - {
          label: "Meta Data",
          name: "meta-data",
          widget: "text",
          hint: "Tags to help improve site search",
          required: false,
        }
      - { label: "Relative Link", name: "relative-link", widget: "string", required: false }
      - {
          label: "Is Unique Page",
          name: "is-unique-page",
          widget: "boolean",
          required: false,
          default: false,
        }
      - {
          label: "Navigator Button",
          name: "navigator-button",
          widget: "boolean",
          required: false,
          default: false,
        }
      - {
          label: "Open Graph Image",
          name: "open-graph",
          widget: "no-space",
          hint:
            "URL for an asset located in the Webflow CMS. Ask an engineer for help if you need to
            change this.",
          required: false,
