collections:
  - name: "static-site-content"
    label: "💻 Static Site Content"
    folder: "content/src"
    fields:
      - { name: "" }

  - name: "recents"
    label: "Recents"
    folder: "content/src/recents"
    summary: "{{name}}"
    identifier_field: "{{slug}}"
    slug: "{{slug}}"
    delete: false
    sortable_fields: ["name", "date", "topics"]
    create: false
    editor:
      preview: false
    fields:
      - { label: "Name", name: "name", widget: "string", required: true }
      - { label: "Slug", name: "slug", widget: "no-space", required: true }
      - {
          label: "Date Posted",
          name: "date",
          widget: "datetime",
          default: "",
          date_format: "YYYY-MM-DD",
          time_format: "",
          required: false,
          hint: "YYYY-MM-DD",
        }
      - label: "Topics"
        name: "topics"
        widget: "select"
        required: false
        options:
          - { label: "Grants and Resources", value: "Grants and Resources" }
          - { label: "Rules and Regulations", value: "Rules and Regulations" }
      - {
          label: "Source",
          name: "source",
          widget: "markdown",
          required: false,
          hint: "Link to the source article",
        }
      - { label: "Section Heading", name: "heading-1", widget: "string", required: false }
      - { label: "Summary", name: "summary", widget: "text", required: false }
      - { label: "Article Content", name: "body", widget: "markdown", required: false }
      - {
          label: "Homepage Announcement Text",
          name: "homepage-announcement-text-2",
          widget: "string",
          required: false,
        }
      - { label: "CTA Text", name: "cta-text", widget: "string", required: false }
      - { label: "CTA Link", name: "cta-link", widget: "string", required: false }
      - label: "Agency"
        name: "agency"
        widget: "select"
        required: false
        options:
          - { label: "NJ Business Action Center", value: "NJ Business Action Center" }
          - {
              label: "NJ Department of Environmental Protection",
              value: "NJ Department of Environmental Protection",
            }
          - { label: "NJ Department of Labor", value: "NJ Department of Labor" }
          - {
              label: "NJ Department of Public Utilities",
              value: "NJ Department of Public Utilities",
            }
          - { label: "NJ Department of Transportation", value: "NJ Department of Transportation" }
          - { label: "NJ Department of Treasury", value: "NJ Department of Treasury" }
          - {
              label: "NJ Economic Development Authority",
              value: "NJ Economic Development Authority",
            }

  - name: "faqs"
    label: "FAQs"
    folder: "content/src/faqs"
    summary: "{{name}}"
    identifier_field: "{{slug}}"
    slug: "{{slug}}"
    delete: false
    sortable_fields: ["name", "category", "sub-category"]
    create: false
    editor:
      preview: false
    fields:
      - { label: "FAQ Title", name: "name", widget: "string" }
      - {
          label: "Slug",
          name: "slug",
          widget: "no-space",
          required: true,
          hint: "URL-friendly identifier (alphanumeric, no spaces or special characters)",
        }
      - {
          label: "FAQ Body",
          name: "body",
          widget: "markdown",
          hint:
            "IMPORTANT: Widgets used in the My Account app are not supported for static site content",
        }
      - label: "Category"
        name: "category"
        widget: "select"
        required: false
        options:
          - { label: "Plan a Business", value: "plan-a-business" }
          - { label: "Start a Business", value: "start-a-business" }
          - { label: "Operate a Business", value: "operate-a-business" }
          - { label: "Grow a Business", value: "grow-a-business" }
          - { label: "Finance a Business", value: "finance-a-business" }
          - { label: "Resources", value: "resources" }
      - label: "Sub-Category"
        name: "sub-category"
        widget: "relation"
        collection: "sub-categories"
        search_fields: ["name"]
        value_field: "slug"
        display_fields: ["name"]
        required: false

  - name: "sub-categories"
    label: "Sub-Categories"
    folder: "content/src/sub-categories"
    format: "json"
    extension: "json"
    summary: "{{name}}"
    identifier_field: "{{slug}}"
    slug: "{{slug}}"
    delete: false
    sortable_fields: ["name"]
    create: false
    editor:
      preview: false
    fields:
      - { label: "Name", name: "name", widget: "string", required: true }
      - {
          label: "Slug",
          name: "slug",
          widget: "no-space",
          required: true,
          hint: "URL-friendly identifier (alphanumeric, no spaces or special characters)",
        }

  - name: "categories"
    label: "Categories"
    folder: "content/src/categories"
    format: "json"
    extension: "json"
    summary: "{{name}}"
    identifier_field: "{{slug}}"
    slug: "{{slug}}"
    delete: false
    sortable_fields: ["name"]
    create: false
    editor:
      preview: false
    fields:
      - { label: "Name", name: "name", widget: "string", required: true }
      - {
          label: "Slug",
          name: "slug",
          widget: "no-space",
          required: true,
          hint: "URL-friendly identifier (alphanumeric, no spaces or special characters)",
        }
      - {
          label: "Nav Name",
          name: "nav-name",
          widget: "string",
          required: false,
          hint: "Name displayed in navigation",
        }
      - {
          label: "Description",
          name: "description-text",
          widget: "text",
          required: false,
          hint: "Description of the topic that appears in each section",
        }
      - {
          label: "Topic Description",
          name: "topic-description",
          widget: "text",
          required: false,
          hint: "Appears on topics screen under the title",
        }
      - {
          label: "Homepage Description",
          name: "homepage-description",
          widget: "text",
          required: false,
          hint: "Appears on homepage tiles",
        }

  - name: "pages"
    label: "Pages"
    folder: "content/src/pages"
    summary: "{{name}}"
    identifier_field: "{{slug}}"
    slug: "{{slug}}"
    delete: false
    sortable_fields: ["name", "category"]
    create: false
    editor:
      preview: false
    fields:
      - { label: "Name", name: "name", widget: "string", required: true }
      - { label: "Slug", name: "slug", widget: "no-space", required: true }
      - label: "Category"
        name: "category"
        widget: "relation"
        collection: "categories"
        search_fields: ["name"]
        value_field: "slug"
        display_fields: ["name"]
        required: false
      - { label: "Sub-Heading Text", name: "sub-heading-text", widget: "text", required: false }
      - {
          label: "Meta Data",
          name: "meta-data",
          widget: "text",
          hint: "Tags to help improve site search",
          required: false,
        }
      - { label: "Main Link Text", name: "main-link-text", widget: "string", required: false }
      - {
          label: "Subpage of...",
          name: "primary-page",
          widget: "relation",
          collection: "pages",
          search_fields: ["name"],
          value_field: "slug",
          display_fields: ["name"],
          required: false,
          hint: "Select the page for which this is a subpage - used for breadcrumb navigation",
