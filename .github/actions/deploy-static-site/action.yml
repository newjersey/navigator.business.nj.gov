name: "Deploy Static Site"
description:
  "Builds the static-site image, pushes it to ECR, and refreshes the ECS Fargate service."

inputs:
  image_tag:
    description: "Immutable image tag to deploy. Defaults to the current Git SHA."
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Resolve Static Site Image Tag
      id: image-tag
      shell: bash
      run: |
        image_tag="${{ inputs.image_tag }}"
        if [ -z "$image_tag" ]; then
          image_tag="$GITHUB_SHA"
        fi

        echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"

    - name: Login to Amazon ECR
      shell: bash
      run: |
        aws ecr get-login-password --region "$AWS_REGION" \
          | docker login --username AWS --password-stdin "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build and Push Static Site Docker Image
      shell: bash
      env:
        IMAGE_VERSION: ${{ steps.image-tag.outputs.image_tag }}
      run: |
        image_repo="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/bfs-static-site"
        image_name="bfs-static-site-${STAGE}"

        docker buildx build --platform linux/amd64 \
          -f packages/static-site/Dockerfile . \
          --build-arg NEXT_PUBLIC_WEB_BASE_URL="${NEXT_PUBLIC_WEB_BASE_URL:-}" \
          -t "$image_repo:$image_name-$IMAGE_VERSION" \
          -t "$image_repo:$image_name" \
          -t "$image_repo:$image_name-latest" \
          --push

        echo "STATIC_SITE_IMAGE_REPO=$image_repo" >> "$GITHUB_ENV"
        echo "STATIC_SITE_IMAGE_NAME=$image_name" >> "$GITHUB_ENV"
        echo "STATIC_SITE_IMAGE_VERSION=$IMAGE_VERSION" >> "$GITHUB_ENV"

    - name: Deploy Static Site ECS Service Stack
      shell: bash
      run: |
        echo "Deploying static site ECS service stack: StaticSiteServiceStack-${STAGE}"
        STATIC_SITE_INFRA_ONLY=true yarn workspace @businessnjgovnavigator/api-cdk cdk deploy "StaticSiteServiceStack-${STAGE}" \
          --qualifier biz-nj \
          --verbose \
          --region us-east-1 \
          --require-approval never

    - name: Deploy Static Site to ECS
      shell: bash
      run: |
        aws ecs update-service \
          --cluster bfs-static-site \
          --service "$STATIC_SITE_IMAGE_NAME" \
          --region "$AWS_REGION" \
          --force-new-deployment
