name: "Deploy CDK"
description: "Clears CDK context, runs CDK bootstrap, and deploys the account application stacks."

runs:
  using: "composite"
  steps:
    - name: Clear CDK Context
      shell: bash
      run: |
        yarn workspace @businessnjgovnavigator/api-cdk cdk context --clear

    - name: CDK Bootstrap
      shell: bash
      run: |
        echo "Running CDK bootstrap for stage: $STAGE ..."
        yarn workspace @businessnjgovnavigator/api-cdk cdk bootstrap aws://$AWS_ACCOUNT_ID/us-east-1 \
          --bootstrap-bucket-name cdk-biz-nj-assets-$AWS_ACCOUNT_ID-us-east-1 \
          --qualifier biz-nj \
          --trust arn:aws:iam::$AWS_ACCOUNT_ID:user/system/bfs-navigator \
          --trust arn:aws:iam::$AWS_ACCOUNT_ID:role/bfs_github_actions_oidc_role \
          --cloudformation-execution-policies arn:aws:iam::aws:policy/AdministratorAccess

    - name: Import StorageStack resources in CDK
      shell: bash
      run: |
        echo "Importing StorageStack resources for stage: $STAGE"
        yarn workspace @businessnjgovnavigator/api-cdk cdk deploy StorageStack-${{ env.STAGE }} \
          --import-existing-resources \
          --qualifier biz-nj \
          --verbose \
          --region us-east-1 \
          --require-approval never

    - name: Import IAM resources in CDK IamStack
      shell: bash
      run: |
        echo "Importing IAM resources for stage: $STAGE"
        yarn workspace @businessnjgovnavigator/api-cdk cdk deploy IamStack-${{ env.STAGE }} \
          --import-existing-resources \
          --qualifier biz-nj \
          --verbose \
          --region us-east-1 \
          --require-approval never

    - name: Import resources in CDK EncryptionStack
      shell: bash
      run: |
        echo "Importing encryption resources for stage: $STAGE"
        yarn workspace @businessnjgovnavigator/api-cdk cdk deploy EncryptionStack-${{ env.STAGE }} \
          --import-existing-resources \
          --qualifier biz-nj \
          --verbose \
          --region us-east-1 \
          --require-approval never

    - name: Deploy CDK
      shell: bash
      run: |
        stacks=(
          "StaticSiteClusterStack"
          "StaticSiteRepositoryStack"
          "DataStack-${STAGE}"
          "IamStack-${STAGE}"
          "StorageStack-${STAGE}"
          "EncryptionStack-${STAGE}"
          "MonitoringStack-${STAGE}"
          "LambdaStack-${STAGE}"
          "ApiStack-${STAGE}"
        )

        if [ "$STAGE" = "dev" ]; then
          stacks+=("BackupStack-dev-shared")
        elif [ "$STAGE" = "staging" ] || [ "$STAGE" = "prod" ]; then
          stacks+=("BackupStack-${STAGE}")
        fi

        yarn workspace @businessnjgovnavigator/api-cdk cdk deploy \
          "${stacks[@]}" \
          --qualifier biz-nj \
          --verbose \
          --region us-east-1 \
          --require-approval never
