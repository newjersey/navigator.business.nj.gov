name: "Deploy CDK"
description: "Clears CDK context, runs CDK bootstrap, and deploys the account application stacks."

runs:
  using: "composite"
  steps:
    - name: Clear CDK Context
      shell: bash
      run: |
        yarn workspace @businessnjgovnavigator/api-cdk cdk context --clear

    - name: CDK Bootstrap
      shell: bash
      run: |
        echo "Running CDK bootstrap for stage: $STAGE ..."
        github_actions_oidc_role_arn="arn:aws:iam::$AWS_ACCOUNT_ID:role/bfs_github_actions_oidc_role"
        github_actions_oidc_role_lookup=""
        trust_args=(
          --trust "arn:aws:iam::$AWS_ACCOUNT_ID:user/system/bfs-navigator"
        )

        if github_actions_oidc_role_lookup="$(aws iam get-role --role-name bfs_github_actions_oidc_role --query 'Role.Arn' --output text 2>&1)"; then
          trust_args+=(--trust "$github_actions_oidc_role_arn")
        elif [[ "$github_actions_oidc_role_lookup" == *"NoSuchEntity"* ]]; then
          echo "Skipping CDK bootstrap trust for missing GitHub Actions OIDC role"
        else
          echo "Could not check for GitHub Actions OIDC role: $github_actions_oidc_role_lookup" >&2
          exit 1
        fi

        yarn workspace @businessnjgovnavigator/api-cdk cdk bootstrap aws://$AWS_ACCOUNT_ID/us-east-1 \
          --bootstrap-bucket-name cdk-biz-nj-assets-$AWS_ACCOUNT_ID-us-east-1 \
          --qualifier biz-nj \
          "${trust_args[@]}" \
          --cloudformation-execution-policies arn:aws:iam::aws:policy/AdministratorAccess

    - name: Deploy CDK
      shell: bash
      run: |
        stacks=(
          "StaticSiteClusterStack"
          "StaticSiteRepositoryStack"
          "DataStack-${STAGE}"
          "IamStack-${STAGE}"
          "StorageStack-${STAGE}"
          "EncryptionStack-${STAGE}"
          "MonitoringStack-${STAGE}"
          "LambdaStack-${STAGE}"
          "ApiStack-${STAGE}"
          "CognitoStack-${STAGE}"
        )

        if [ "$STAGE" = "dev" ]; then
          stacks+=("BackupStack-dev-shared")
        elif [ "$STAGE" = "staging" ] || [ "$STAGE" = "prod" ]; then
          stacks+=("BackupStack-${STAGE}")
        fi

        yarn workspace @businessnjgovnavigator/api-cdk cdk deploy \
          "${stacks[@]}" \
          --qualifier biz-nj \
          --verbose \
          --region us-east-1 \
          --require-approval never

    - name: Preserve expiring backup recovery points
      shell: bash
      run: |
        VAULT_NAME="BizX_dynamodb_backups"
        CUTOFF_DATE=$(date -u -d "+30 days" +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -u -v+30d +%Y-%m-%dT%H:%M:%SZ)

        echo "Removing deletion deadline from recovery points expiring before $CUTOFF_DATE"

        ARNS=$(aws backup list-recovery-points-by-backup-vault \
          --backup-vault-name "$VAULT_NAME" \
          --region us-east-1 \
          --query "RecoveryPoints[?Lifecycle.DeleteAt<='${CUTOFF_DATE}'].RecoveryPointArn" \
          --output text)

        if [ -z "$ARNS" ] || [ "$ARNS" = "None" ]; then
          echo "No recovery points expiring within 30 days."
          exit 0
        fi

        for ARN in $ARNS; do
          echo "Extending: $ARN"
          aws backup update-recovery-point-lifecycle \
            --backup-vault-name "$VAULT_NAME" \
            --recovery-point-arn "$ARN" \
            --lifecycle '{"MoveToColdStorageAfterDays": 14}' \
            --region us-east-1
        done

        echo "Done. Extended $(echo "$ARNS" | wc -w | tr -d ' ') recovery points."

    # Uncomment the step below to reapply the 6-month deletion policy to
