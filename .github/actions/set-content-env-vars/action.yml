name: "Set Content Environment Variables"
description:
  "Sets environment variables specific to the content stage. The content environment inherits
  development variables unless overridden here."

inputs:
  API_BASE_URL:
    description: "Base URL for API calls in the content environment"
    required: true

  AUTH_DOMAIN:
    description: "Cognito auth domain for content"
    required: true

  MYNJ_ROLE_NAME:
    description: "Role name used for MyNJ integration in content"
    required: true

  MYNJ_SERVICE_TOKEN:
    description: "Service token for MyNJ integration in content"
    required: true

  AWS_CRYPTO_TAX_ID_ENCRYPTION_KEY:
    description: "KMS encryption key for Tax ID encryption in content"
    required: true

  AWS_CRYPTO_TAX_ID_HASHING_KEY:
    description: "KMS hashing key for Tax ID hashing in content"
    required: true

  SHOW_DISABLED_INDUSTRIES:
    description: "Feature flag determining visibility of disabled industries"
    required: true

  COGNITO_IDENTITY_POOL_ID:
    description: "Cognito Identity Pool ID for content"
    required: true

  COGNITO_USER_POOL_ID:
    description: "Cognito User Pool ID for content"
    required: true

  COGNITO_WEB_CLIENT_ID:
    description: "Cognito Web Client ID for content"
    required: true

  REDIRECT_URL:
    description: "Redirect URL for login / MyNJ in content"
    required: true

  NEXT_PUBLIC_WEB_BASE_URL:
    description: "Base URL for the frontend in content"
    required: true

runs:
  using: "composite"
  steps:
    - name: Export Content Environment Variables
      shell: bash
      run: |
        echo "API_BASE_URL=${{ inputs.API_BASE_URL }}" >> $GITHUB_ENV
        echo "AUTH_DOMAIN=${{ inputs.AUTH_DOMAIN }}" >> $GITHUB_ENV
        echo "MYNJ_ROLE_NAME=${{ inputs.MYNJ_ROLE_NAME }}" >> $GITHUB_ENV
        echo "MYNJ_SERVICE_TOKEN=${{ inputs.MYNJ_SERVICE_TOKEN }}" >> $GITHUB_ENV
        echo "AWS_CRYPTO_TAX_ID_ENCRYPTION_KEY=${{ inputs.AWS_CRYPTO_TAX_ID_ENCRYPTION_KEY }}" >> $GITHUB_ENV
        echo "AWS_CRYPTO_TAX_ID_HASHING_KEY=${{ inputs.AWS_CRYPTO_TAX_ID_HASHING_KEY }}" >> $GITHUB_ENV
        echo "SHOW_DISABLED_INDUSTRIES=${{ inputs.SHOW_DISABLED_INDUSTRIES }}" >> $GITHUB_ENV
        echo "COGNITO_IDENTITY_POOL_ID=${{ inputs.COGNITO_IDENTITY_POOL_ID }}" >> $GITHUB_ENV
        echo "COGNITO_USER_POOL_ID=${{ inputs.COGNITO_USER_POOL_ID }}" >> $GITHUB_ENV
        echo "COGNITO_WEB_CLIENT_ID=${{ inputs.COGNITO_WEB_CLIENT_ID }}" >> $GITHUB_ENV
        echo "REDIRECT_URL=${{ inputs.REDIRECT_URL }}" >> $GITHUB_ENV
        echo "NEXT_PUBLIC_WEB_BASE_URL=${{ inputs.NEXT_PUBLIC_WEB_BASE_URL }}" >> $GITHUB_ENV
