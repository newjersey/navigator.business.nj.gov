name: Static Site CI

on:
  pull_request:
    paths:
      - "packages/static-site/**"
      - ".github/workflows/static-site-ci.yml"
  push:
    branches:
      - main
    paths:
      - "packages/static-site/**"
      - ".github/workflows/static-site-ci.yml"
  workflow_dispatch:

jobs:
  static-site-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: packages/static-site/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: packages/static-site
        run: pnpm install --frozen-lockfile

      - name: Run lint
        working-directory: packages/static-site
        run: pnpm lint

      - name: Run typecheck
        working-directory: packages/static-site
        run: pnpm typecheck

      - name: Run tests
        working-directory: packages/static-site
        run: pnpm test

      - name: Build application
        working-directory: packages/static-site
        run: pnpm build
