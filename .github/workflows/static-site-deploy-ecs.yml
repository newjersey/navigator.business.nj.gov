name: Deploy Static Site to ECS

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: dev
    env:
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID_DEV }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID_DEV }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY_DEV }}
      AWS_REGION: ${{ vars.AWS_CRYPTO_CONTEXT_ORIGIN }}
      BASIC_AUTH_PASSWORD: ${{ secrets.BASIC_AUTH_PASSWORD }}
      BASIC_AUTH_USERNAME: ${{ vars.BASIC_AUTH_USERNAME }}
      NEXT_PUBLIC_MULTILINGUAL_ENABLED: ${{ vars.NEXT_PUBLIC_MULTILINGUAL_ENABLED }}
      NEXT_PUBLIC_WEB_BASE_URL: ${{ vars.WEB_BASE_URL_DEV }}
      SG_ID: ${{ vars.SG_ID_AWS_DEV }}
      STAGE: ${{ vars.STAGE_DEV }}
      SUBNET_ID_01: ${{ vars.SUBNET_ID_01_AWS_DEV }}
      SUBNET_ID_02: ${{ vars.SUBNET_ID_02_AWS_DEV }}
      VPC_ID: ${{ vars.VPC_ID_AWS_DEV }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: yarn

      - name: Install Dependencies
        shell: bash
        run: yarn install --immutable

      - name: Build Content
        shell: bash
        run: yarn workspace @businessnjgovnavigator/content build

      - name: Build Content Types
        shell: bash
        run: yarn workspace @businessnjgovnavigator/content-types build

      - name: Deploy Static Site
        uses: ./.github/actions/deploy-static-site
